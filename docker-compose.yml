version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mynavsite
      POSTGRES_USER: mynavuser
      POSTGRES_PASSWORD: mynavpass
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    command: sh -c "npm install && npm start"
    ports:
      - "3000:3000"
    depends_on:
      - db
