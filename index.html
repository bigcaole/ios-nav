<!doctype html>

    <meta charset="utf-8" />

    <title>我的 iOS 风格导航</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f2f2f7" />
    <script>
      (function () {
        try {
          const saved = localStorage.getItem("theme");
          const hour = new Date().getHours();
          const prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          const autoDark = hour >= 18 || hour < 6 || prefersDark;
          const shouldDark = saved ? saved === "dark" : autoDark;
          if (shouldDark) {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        } catch (err) {}
      })();
    </script>
    <link rel="stylesheet" href="/tw-lite.css" />
    <link rel="stylesheet" href="/app.css" />
  </head>

      </div>

      <div

        class="fixed top-[76px] left-1/2 -translate-x-1/2 w-fit max-w-[90%] md:max-w-[65%] h-14 rounded-full shadow-lg ring-1 ring-white/50 dark:ring-white/10 backdrop-blur-xl flex items-center overflow-x-auto whitespace-nowrap scrollbar-hide px-4 z-40 transform"
      ></div>
      <main class="grid" id="appGrid"></main>

    >
      <div class="dock-grid" id="dockGrid" data-dock="true"></div>
    </div>

    <div class="modal" id="modal">
      <div class="sheet glass allow-overflow">
        <div class="modal-header">
          <button type="button" class="back-btn" id="modalBackBtn" aria-label="返回">
            <svg class="h-4 w-4" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M15.5 5.5a1 1 0 0 1 0 1.4L11.4 11l4.1 4.1a1 1 0 1 1-1.4 1.4l-4.8-4.8a1 1 0 0 1 0-1.4l4.8-4.8a1 1 0 0 1 1.4 0Z" />
            </svg>
          </button>
          <h2 id="formTitle">添加导航</h2>
        </div>
        <form id="linkForm">
          <div class="field">
            <label for="titleInput">标题</label>
            <input
              id="titleInput"
              class="text-slate-900 dark:text-white bg-white/50 dark:bg-slate-700/50 border border-slate-300 dark:border-gray-600 placeholder-slate-400 dark:placeholder-slate-500 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            style="color: #1a1a1a !important; background-color: rgba(255, 255, 255, 0.9) !important;"
            type="text"
            placeholder="例如：苹果官网"
            required
          />
          </div>
          <div class="field">
            <label for="urlInput">网址</label>
            <div class="url-row">
              <div class="protocol-toggle" id="protocolToggle">
                <button type="button" class="protocol-btn active" data-proto="https://">https://</button>
                <button type="button" class="protocol-btn" data-proto="http://">http://</button>
              </div>
              <input
                id="urlInput"
                class="text-slate-900 dark:text-white bg-white/50 dark:bg-slate-700/50 border border-slate-300 dark:border-gray-600 placeholder-slate-400 dark:placeholder-slate-500 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
              style="color: #1a1a1a !important; background-color: rgba(255, 255, 255, 0.9) !important;"
              type="text"
              inputmode="url"
              placeholder="example.com"
              required
            />
            </div>
          </div>
          <div class="field">
            <label for="categorySelectBtn">分类</label>
            <div class="select" id="categorySelect">
              <button type="button" class="select-btn" id="categorySelectBtn">
                <span id="categorySelectLabel">选择分类</span>
                <svg class="h-4 w-4" viewBox="0 0 24 24" aria-hidden="true">
                  <path fill="currentColor" d="M7 10l5 5 5-5H7z" />
                </svg>
              </button>
              <div class="select-menu" id="categorySelectMenu"></div>
            </div>
            <input id="categoryInput" type="hidden" />
          </div>
          <div class="toggle-row">
            <span class="text-slate-900 dark:text-white">固定到底部快捷栏</span>
            <label class="toggle">
              <input id="dockInput" type="checkbox" />
              <span class="slider"></span>
            </label>
          </div>
          <div class="toggle-row">
            <span class="text-slate-900 dark:text-white">仅登录可见</span>
            <label class="toggle">
              <input id="privateInput" type="checkbox" />
              <span class="slider"></span>
            </label>
          </div>
          <div class="footer">
            <button type="button" class="btn bg-slate-100 text-slate-700" id="cancelBtn">取消</button>
            <button type="submit" class="btn bg-blue-600 text-white border border-blue-600/60" id="saveBtn">保存</button>
          </div>
        </form>
      </div>
    </div>

    <div class="modal" id="addMenuModal">
      <div class="sheet glass">
        <div class="modal-header">
          <button type="button" class="back-btn" id="addMenuCloseBtn" aria-label="关闭">
            <svg class="h-4 w-4" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M15.5 5.5a1 1 0 0 1 0 1.4L11.4 11l4.1 4.1a1 1 0 1 1-1.4 1.4l-4.8-4.8a1 1 0 0 1 0-1.4l4.8-4.8a1 1 0 0 1 1.4 0Z" />
            </svg>
          </button>
          <h2>添加</h2>
        </div>
        <div class="settings-row">
          <span class="text-slate-800 dark:text-slate-100">添加链接项目</span>
          <button class="btn bg-blue-600 text-white border border-blue-600/60" id="addLinkEntryBtn">添加</button>
        </div>
        <div class="settings-row">
          <span class="text-slate-800 dark:text-slate-100">管理/新建分类</span>
          <button class="btn bg-slate-100 text-slate-700 border border-slate-200" id="manageCategoryEntryBtn">管理</button>
        </div>
      </div>
    </div>

    <div class="modal" id="categoryManagerModal">
      <div class="sheet glass">
        <div class="modal-header">
          <button type="button" class="back-btn" id="categoryManagerCloseBtn" aria-label="关闭">
            <svg class="h-4 w-4" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M15.5 5.5a1 1 0 0 1 0 1.4L11.4 11l4.1 4.1a1 1 0 1 1-1.4 1.4l-4.8-4.8a1 1 0 0 1 0-1.4l4.8-4.8a1 1 0 0 1 1.4 0Z" />
            </svg>
          </button>
          <h2>分类管理</h2>
        </div>
        <div class="field">
          <label for="newCategoryInput">新建分类</label>
          <div class="flex gap-2">
            <input
              id="newCategoryInput"
              class="text-slate-900 dark:text-white bg-slate-50 dark:bg-slate-700/50 border border-slate-300 dark:border-gray-600 placeholder-slate-400 dark:placeholder-slate-500 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
              type="text"
              placeholder="请输入分类名称"
            />
            <button class="btn bg-blue-600 text-white border border-blue-600/60" id="createCategoryBtn">新增</button>
          </div>
          <div class="toggle-row mt-2">
            <span class="text-slate-800 dark:text-slate-100">隐私分类</span>
            <label class="toggle">
              <input id="newCategoryPrivate" type="checkbox" />
              <span class="slider"></span>
            </label>
          </div>
        </div>
        <div class="category-manager-list" id="categoryManagerList"></div>
        <div class="footer">
          <button
            type="button"
            class="btn bg-slate-100 text-slate-700 border border-slate-200"
            id="categoryManagerDoneBtn"
          >完成</button>
        </div>
      </div>
    </div>

    <div class="modal" id="settingsModal">
      <div class="modal-backdrop" id="settingsBackdrop"></div>
      <div class="sheet glass bg-white/90 dark:bg-slate-900/90 backdrop-blur-2xl">
        <h2>设置</h2>
        <div class="settings-group bg-white/40 dark:bg-black/40 backdrop-blur-md border border-white/20 rounded-xl p-3">
          <div class="settings-row">
            <span class="text-slate-800 dark:text-slate-100">外观装修</span>
          </div>
          <div class="field">
            <label for="siteNameInput" class="text-slate-800 dark:text-slate-100">网站标题</label>
            <input
              id="siteNameInput"
              class="text-slate-900 dark:text-white bg-slate-50 dark:bg-slate-700/50 border border-slate-300 dark:border-gray-600 placeholder-slate-400 dark:placeholder-slate-500 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
              style="color: #1a1a1a !important; background-color: rgba(248, 250, 252, 0.9) !important;"
              type="text"
              placeholder="例如：我的导航站"
            />
          </div>
          <div class="field">
            <label for="logoInput" class="text-slate-800 dark:text-slate-100">Logo 上传</label>
            <input
              id="logoInput"
              class="text-slate-900 dark:text-white bg-slate-50 dark:bg-slate-700/50 border border-slate-300 dark:border-gray-600 placeholder-slate-400 dark:placeholder-slate-500 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
              style="color: #1a1a1a !important; background-color: rgba(248, 250, 252, 0.9) !important;"
              type="file"
              accept="image/*"
            />
          </div>
          <div class="field">
            <label for="bgColorInput" class="text-slate-800 dark:text-slate-100">背景颜色</label>
            <input id="bgColorInput" class="h-10 w-24 rounded-lg border border-slate-300 dark:border-gray-600" type="color" />
            <div class="mt-2 flex gap-2">
              <button
                type="button"
                class="btn bg-blue-600 text-white border border-blue-600/60"
                id="saveBgBtn"
              >保存背景</button>
              <button
                type="button"
                class="btn bg-slate-100 text-slate-700 border border-slate-200"
                id="resetBgBtn"
              >恢复默认</button>
            </div>
          </div>
        </div>
        <div class="settings-row">
          <span class="text-slate-800 dark:text-slate-100">字体大小</span>
          <input id="fontSizeInput" type="range" min="12" max="20" value="15" />
        </div>
        <div class="settings-row">
          <span class="text-slate-800 dark:text-slate-100">图标大小</span>
          <input id="iconSizeInput" type="range" min="0" max="100" value="100" />
        </div>
        <div class="settings-row">
          <span class="text-slate-800 dark:text-slate-100">加粗文字</span>

            <span class="slider"></span>
          </label>

              <input id="userTotpToggle" type="checkbox" />

            </label>
          </div>
        <div class="text-slate-700 dark:text-slate-200 text-xs mt-1 opacity-100">
          启用后，下次登录需要绑定或输入验证码。
        </div>
        </div>
        <div class="settings-group" id="backupGroup">
          <div class="settings-row">
            <span class="text-slate-800 dark:text-slate-100">导出备份</span>
            <a
              class="btn bg-slate-100 text-slate-700 border border-gray-200/50"
              id="exportBtn"
              href="/api/backup/export"
            >下载</a>
          </div>
          <div class="settings-row">
            <span class="text-slate-800 dark:text-slate-100">导入备份</span>
            <input
              id="importFile"
              class="text-slate-900 dark:text-white bg-slate-50 dark:bg-slate-700/50 border border-slate-300 dark:border-gray-600 placeholder-slate-400 dark:placeholder-slate-500 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
              style="color: #1a1a1a !important; background-color: rgba(248, 250, 252, 0.9) !important;"
              type="file"
              accept=".json"
            />
          </div>
          <div class="settings-row">
            <span></span>
            <button class="btn bg-slate-100 text-slate-700 border border-gray-200/50" id="importBtn">导入</button>
          </div>
        </div>
        <div class="footer">
          <button
            type="button"
            class="btn bg-blue-600 text-white border border-blue-600/60"
            id="settingsSaveBtn"
          >保存设置</button>
          <button
            type="button"
            class="btn bg-slate-100 text-slate-700 border border-slate-200"
            id="settingsCloseBtn"
          >关闭</button>
        </div>
      </div>
    </div>

    <script src="/vendor-sortable.min.js" defer></script>
    <script src="/app.js" defer></script>
  </body>
</html>
