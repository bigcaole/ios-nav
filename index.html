<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>我的 iOS 风格导航</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f2f2f7" />
    <script>
      (function () {
        try {
          const saved = localStorage.getItem("theme");
          const hour = new Date().getHours();
          const prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          const autoDark = hour >= 18 || hour < 6 || prefersDark;
          const shouldDark = saved ? saved === "dark" : autoDark;
          if (shouldDark) {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        } catch (err) {}
      })();
    </script>
    <style>
      :root {
        --bg-a: #f7f2ee;
        --bg-b: #e7edf7;
        --card: #ffffff;
        --text: #17181a;
        --muted: #6a6f7a;
        --dock: rgba(255, 255, 255, 0.6);
        --dock-border: rgba(255, 255, 255, 0.4);
        --shadow: 0 10px 30px rgba(16, 24, 40, 0.12);
        --radius: 22px;
        --base-size: 15px;
        --label-weight: 600;
        --title-weight: 700;
        --dynamic-text: #0f172a;
        --dynamic-placeholder: #64748b;
      }
      html.dark {
        --bg-a: #0f1115;
        --bg-b: #141826;
        --card: #1c2029;
        --text: #f5f7fb;
        --muted: #9aa3b2;
        --dock: rgba(28, 32, 41, 0.75);
        --dock-border: rgba(255, 255, 255, 0.08);
        --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        margin: 0;
        font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: var(--text);
        min-height: 100vh;
        font-size: var(--base-size);
        transition: background 0.35s ease, color 0.35s ease;
      }
      input::placeholder,
      textarea::placeholder {
        color: var(--dynamic-placeholder);
      }
      body.bold {
        --label-weight: 700;
        --title-weight: 800;
      }
      header {
        padding: 28px 22px 6px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .title-wrap {
        display: grid;
        gap: 6px;
      }
      h1 {
        margin: 0;
        font-size: 26px;
        letter-spacing: 0.3px;
        font-weight: var(--title-weight);
      }
      p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 14px;
      }
      .grid {
        display: flex;
        flex-direction: column;
        gap: 18px;
        padding: 18px 22px 120px;
      }
      .category-card {
        width: 100%;
        max-width: 100%;
        border-radius: 18px;
        padding: 12px 12px;
        box-shadow: none;
        background: rgba(255, 255, 255, 0.65);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0;
        transition: background-color 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
        position: relative;
        height: auto !important;
        min-height: 0 !important;
        overflow: visible !important;
        overflow-x: visible !important;
        overflow-y: visible !important;
        padding-bottom: 20px !important;
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
      }
      html.dark .category-card {
        background: rgba(30, 41, 59, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .category-title {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 16px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 500;
        min-width: 80px;
        background: rgba(0, 0, 0, 0.3);
        color: #ffffff;
        margin: 0;
        transition: all 0.25s ease;
        white-space: nowrap;
        width: fit-content;
      }
      .category-grid {
        display: flex;
        align-items: center;
        gap: 24px;
        flex: 1;
        overflow: visible !important;
        overflow-x: visible !important;
        overflow-y: visible !important;
        flex-wrap: nowrap;
        scroll-snap-type: x mandatory;
        scroll-padding: 8px;
        scroll-behavior: smooth;
        padding: 20px 0 24px 96px;
        -ms-overflow-style: none;
        scrollbar-width: none;
        pointer-events: auto;
      }
      .category-grid::-webkit-scrollbar {
        display: none;
      }
      .category-page {
        flex: 0 0 100%;
        min-width: 100%;
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: var(--icon-size, 40px);
        grid-template-rows: repeat(1, var(--icon-size, 40px));
        gap: var(--grid-gap, 16px);
        scroll-snap-align: start;
        justify-content: flex-start;
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .pagination-dots {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
      }
      .pagination-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.4);
        transition: all 0.3s ease;
      }
      .pagination-dot.active {
        width: 20px;
        background: rgba(255, 255, 255, 0.85);
      }
      html.dark .pagination-dot {
        background: rgba(148, 163, 184, 0.4);
      }
      html.dark .pagination-dot.active {
        background: rgba(255, 255, 255, 0.9);
      }
      .page-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 30px;
        height: 30px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.4);
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        display: grid;
        place-items: center;
        color: #0f172a;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      html.dark .page-arrow {
        background: rgba(15, 23, 42, 0.6);
        color: #f8fafc;
        border-color: rgba(255, 255, 255, 0.15);
      }
      .page-arrow.left {
        left: 10px;
      }
      .page-arrow.right {
        right: 10px;
      }
      .page-arrow.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .app {
        text-decoration: none;
        color: inherit;
        text-align: center;
        display: grid;
        gap: 6px;
        justify-items: center;
        position: relative;
        overflow: visible !important;
        transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      }
      .is-editing .category-grid,
      .is-editing .category-card,
      .is-editing .dock-grid,
      .is-editing .dock-slot,
      .app-unlocked .category-grid,
      .app-unlocked .category-card,
      .app-unlocked .dock-grid,
      .app-unlocked .dock-slot {
        pointer-events: auto !important;
        user-select: auto !important;
        -webkit-user-drag: element !important;
        cursor: grab !important;
      }
      .is-editing .category-grid:active,
      .is-editing .dock-grid:active,
      .app-unlocked .category-grid:active,
      .app-unlocked .dock-grid:active {
        cursor: grabbing !important;
      }
      .is-editing .icon {
        position: relative;
        z-index: 100;
      }
      .icon,
      .icon img {
        -webkit-user-drag: none;
      }
      .mode-sort .icon:hover,
      .mode-sort .app:hover .icon {
        transform: none !important;
      }
      .mode-sort .category-grid {
        min-height: 50px;
      }
      .mode-sort * {
        pointer-events: auto !important;
        user-select: none !important;
        -webkit-user-drag: none !important;
        cursor: grab !important;
      }
      .mode-sort .sortable-ghost {
        background: rgba(255, 255, 255, 0.12);
        border: 1px dashed rgba(255, 255, 255, 0.5);
        border-radius: 16px;
        opacity: 0.3;
      }
      html.dark .mode-sort .sortable-ghost {
        background: rgba(15, 23, 42, 0.35);
        border-color: rgba(226, 232, 240, 0.35);
      }
      .mode-sort .sortable-drag {
        opacity: 0.5 !important;
        transform: scale(1.1) rotate(-2deg) !important;
        box-shadow: 0 16px 32px rgba(15, 23, 42, 0.3);
        animation: none !important;
      }
      .mode-sort .sortable-drag .icon {
        animation: none !important;
      }
      .is-editing .icon,
      .is-editing .app {
        transform: none !important;
        transition: none !important;
      }
      .sort-unlocked .edit-badge,
      .sort-unlocked .delete-badge {
        display: none !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
      .sortable-ghost,
      .sortable-drag,
      .sortable-chosen {
        z-index: 9999 !important;
      }
      .sortable-drag {
        cursor: grabbing !important;
      }
      .is-editing * {
        pointer-events: auto !important;
        user-select: auto !important;
        -webkit-user-drag: none !important;
      }
      .is-editing .category-title-capsule {
        z-index: 9999;
        cursor: grab;
      }
      .app-unlocked .category-grid,
      .app-unlocked .dock-grid,
      .app-unlocked .dock-slot {
        user-select: auto !important;
        pointer-events: auto !important;
        cursor: grab;
      }
      .app-unlocked .category-grid:active,
      .app-unlocked .dock-grid:active,
      .app-unlocked .dock-slot:active {
        cursor: grabbing;
      }
      .is-dragging .app,
      .is-dragging .icon {
        transform: none !important;
        transition: none !important;
      }
      .is-dragging .icon {
        filter: none !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }
      .is-dragging .app {
        opacity: 0.7;
      }
      .app-unlocked * {
        pointer-events: auto !important;
        user-select: none !important;
      }
      .icon {
        width: var(--icon-size, 40px);
        height: var(--icon-size, 40px);
        min-width: 32px;
        border-radius: 16px;
        background: var(--card);
        box-shadow: var(--shadow);
        display: grid;
        place-items: center;
        font-size: 12px;
        font-weight: 700;
        color: #ffffff;
        overflow: visible;
        position: relative;
        transform: translateZ(0);
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes jiggle {
        0% {
          transform: rotate(-1.5deg);
        }
        50% {
          transform: rotate(1.5deg);
        }
        100% {
          transform: rotate(-1.5deg);
        }
      }
      .jiggle .icon {
        animation: jiggle 0.2s ease-in-out infinite;
        transform-origin: 50% 60%;
      }
      .jiggle .icon:hover {
        transform: rotate(0deg);
      }
      .minus {
        position: absolute;
        left: 6px;
        top: 6px;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: #ff3b30;
        border: 2px solid #ffffff;
        box-shadow: 0 6px 12px rgba(16, 24, 40, 0.22);
        display: grid;
        place-items: center;
        color: #ffffff;
        font-weight: 700;
        font-size: 16px;
        border: none;
        cursor: pointer;
        z-index: 50;
        opacity: 0;
        pointer-events: none;
      }
      .edit-badge {
        position: absolute;
        right: 6px;
        top: 6px;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: #0a84ff;
        border: 2px solid #ffffff;
        box-shadow: 0 6px 12px rgba(16, 24, 40, 0.22);
        display: grid;
        place-items: center;
        color: #ffffff;
        font-weight: 700;
        font-size: 12px;
        border: none;
        cursor: pointer;
        z-index: 50;
        opacity: 0;
        pointer-events: none;
      }
        .edit-badge,
        .delete-badge {
          display: none !important;
        }
        .delete-bubble {
          position: absolute;
          left: 50%;
          bottom: -40px;
          transform: translateX(-50%);
          display: inline-flex;
          gap: 6px;
          padding: 6px 8px;
          border-radius: 999px;
          background: rgba(0, 0, 0, 0.75);
          color: #ffffff;
          font-size: 12px;
          z-index: 60;
          pointer-events: auto;
          backdrop-filter: blur(8px);
          -webkit-backdrop-filter: blur(8px);
          box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }
        .delete-bubble button {
          border: none;
          background: transparent;
          color: #ffffff;
          font-weight: 600;
          padding: 2px 6px;
          border-radius: 999px;
          cursor: pointer;
        }
        .delete-bubble button.confirm {
          background: rgba(248, 113, 113, 0.2);
        }
        .delete-bubble button.cancel {
          background: rgba(148, 163, 184, 0.2);
        }
        .add-placeholder {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 6px;
          cursor: pointer;
        }
        .add-placeholder .icon {
          border: 1px dashed rgba(148, 163, 184, 0.7);
          background: rgba(255, 255, 255, 0.25);
          color: #ffffff;
          font-size: 18px;
          font-weight: 600;
        }
        html.dark .add-placeholder .icon {
          border-color: rgba(148, 163, 184, 0.5);
          background: rgba(15, 23, 42, 0.4);
        }
        .category-add-card {
          min-height: 120px;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 20px 24px;
          border-radius: 22px;
          border: 1px dashed rgba(148, 163, 184, 0.6);
          background: rgba(255, 255, 255, 0.35);
          backdrop-filter: blur(14px);
          -webkit-backdrop-filter: blur(14px);
        }
        html.dark .category-add-card {
          border-color: rgba(148, 163, 184, 0.35);
          background: rgba(15, 23, 42, 0.45);
        }
        .category-add-card .add-category-btn {
          display: inline-flex;
          align-items: center;
          gap: 10px;
          padding: 10px 18px;
          border-radius: 999px;
          border: 1px solid rgba(255, 255, 255, 0.35);
          background: rgba(255, 255, 255, 0.35);
          color: #0f172a;
          font-weight: 600;
          cursor: pointer;
        }
        html.dark .category-add-card .add-category-btn {
          color: #f8fafc;
          background: rgba(15, 23, 42, 0.55);
          border-color: rgba(255, 255, 255, 0.15);
        }
        .dock-add-placeholder .icon {
          border: 1px dashed rgba(148, 163, 184, 0.7);
          background: rgba(255, 255, 255, 0.18);
          color: #ffffff;
          font-size: 18px;
          font-weight: 600;
        }
        html.dark .dock-add-placeholder .icon {
          border-color: rgba(148, 163, 184, 0.5);
          background: rgba(15, 23, 42, 0.4);
        }
      body.is-editing .app,
      body.is-deleting .app {
        animation: jiggle 0.2s ease-in-out infinite;
      }
      .rename-input {
        width: min(220px, 70vw);
        border: 1px solid rgba(148, 163, 184, 0.45);
        border-radius: 12px;
        padding: 4px 10px;
        font-size: 14px;
        background: rgba(255, 255, 255, 0.9);
      }
      html.dark .rename-input {
        background: rgba(15, 23, 42, 0.8);
        border-color: rgba(148, 163, 184, 0.3);
        color: #ffffff;
      }
      .editable {
        border-bottom: 1px dashed rgba(71, 85, 105, 0.6);
      }
      html.dark .editable {
        border-bottom-color: rgba(226, 232, 240, 0.6);
      }
      @keyframes wiggle {
        0% {
          transform: translateZ(0) rotate(0deg);
        }
        25% {
          transform: translateZ(0) rotate(-1.5deg);
        }
        50% {
          transform: translateZ(0) rotate(0deg);
        }
        75% {
          transform: translateZ(0) rotate(1.5deg);
        }
        100% {
          transform: translateZ(0) rotate(0deg);
        }
      }
      .sort-unlocked .icon {
        animation: wiggle 0.3s ease-in-out infinite;
        transform-origin: 50% 60%;
      }
      .sort-unlocked .sortable-drag .icon {
        animation: none !important;
      }
      .toast {
        position: fixed;
        top: 84px;
        left: 50%;
        transform: translateX(-50%) translateY(-10px);
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.85);
        color: #ffffff;
        font-size: 13px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
        z-index: 120;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      body.modal-open {
        overflow: hidden;
      }
      #settingsModal .sheet h2,
      #settingsModal .sheet .field label,
      #settingsModal .sheet .settings-row > span {
        color: #000000 !important;
      }
      html.dark #settingsModal .sheet h2,
      html.dark #settingsModal .sheet .field label,
      html.dark #settingsModal .sheet .settings-row > span {
        color: #f8fafc !important;
      }
      .edit-toolbar {
        position: fixed;
        top: 16px;
        left: 16px;
        right: 16px;
        z-index: 210;
        display: none;
        align-items: center;
        justify-content: flex-end;
        padding: 10px 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.45);
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
      }
      html.dark .edit-toolbar {
        background: rgba(2, 6, 23, 0.6);
        border-color: rgba(148, 163, 184, 0.25);
      }
      .edit-toolbar.active {
        display: flex;
      }
      .icon .lock {
        position: absolute;
        top: 6px;
        right: 6px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.6);
        display: grid;
        place-items: center;
      }
      .icon .lock svg {
        width: 11px;
        height: 11px;
        fill: #ffffff;
      }
      .icon img {
        width: 72%;
        height: 72%;
        object-fit: contain;
        display: block;
        border-radius: 16px;
      }
      @media (hover: hover) {
        .app:hover .icon {
          transform: scale(1.15);
          box-shadow: 0 16px 36px rgba(16, 24, 40, 0.2);
        }
      }
      .icon-label-capsule {
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        min-width: 40px;
        height: 20px;
        background-color: rgba(0, 0, 0, 0.5) !important;
        border-radius: 9999px;
        padding: 2px 8px;
        margin-top: 6px;
      }
      html.dark .icon-label-capsule {
        background-color: rgba(255, 255, 255, 0.2) !important;
      }
      .icon-label-text {
        color: #ffffff !important;
        font-size: 11px !important;
        font-weight: 500 !important;
        white-space: nowrap !important;
        overflow: visible !important;
      }
      .app:hover .icon-label-capsule {
        transform: scale(1.05);
        transition: transform 0.2s ease;
      }
      .dock {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        width: max-content;
        max-width: 90vw;
        padding: 12px 24px;
        border-radius: 24px;
        background: rgba(0, 0, 0, 0.2) !important;
        border: 1px solid rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        box-shadow: 0 24px 50px rgba(15, 23, 42, 0.25);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: background-color 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
        overflow-x: auto;
        overflow-y: visible;
      }
      html.dark .dock {
        background: rgba(15, 23, 42, 0.65) !important;
        border-color: rgba(255, 255, 255, 0.12);
      }
      .dock::-webkit-scrollbar {
        display: none;
      }
      .dock-empty {
        min-height: 100px;
      }
      .sort-unlocked #dock-container {
        min-height: 110px !important;
      }
      .dock-grid {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        flex-wrap: nowrap;
        width: max-content;
      }
      .dock-slot {
        width: 60px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
        position: relative;
        overflow: visible;
      }
      .dock-slot.empty {
        border: 1px dashed rgba(148, 163, 184, 0.8);
        background: rgba(255, 255, 255, 0.15);
      }
      html.dark .dock-slot.empty {
        border-color: rgba(148, 163, 184, 0.5);
        background: rgba(15, 23, 42, 0.35);
      }
      body:not(.mode-sort):not(.mode-delete) .dock-slot.empty {
        display: none;
      }
      .dock-slot.empty,
      .dock-add-placeholder .icon {
        color: rgba(248, 250, 252, 0.9);
      }
      @media (min-width: 1024px) {
        .dock-grid {
          display: flex;
          justify-content: center;
          width: max-content;
        }
      }
      .dock-item {
        width: 60px;
        height: 60px;
        aspect-ratio: 1 / 1;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
        position: relative;
        overflow: visible;
        z-index: 2;
        transition: transform 0.2s ease-out;
      }
      .dock-item .minus,
      .dock-item .edit-badge {
        z-index: 3;
      }
      .dock-item .icon {
        width: 100%;
        height: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 16px;
        padding: 10px;
        background: transparent;
        box-shadow: 0 8px 18px rgba(16, 24, 40, 0.18);
        -webkit-box-reflect: below 4px linear-gradient(transparent, rgba(255, 255, 255, 0.12));
        transition: background-color 0.2s ease;
      }
      .dock-item:hover .icon {
        background: rgba(255, 255, 255, 0.5);
      }
      .dock-item .icon img {

      async function parseCategoryResponse(res, fallbackMessage) {
        const contentType = res.headers.get("content-type") || "";
        if (!res.ok) {
          if (contentType.includes("text/html")) {
            const text = await res.text();
            console.warn("收到非 JSON 响应，可能是静态资源路径冲突");
            console.warn("Response preview:", text.slice(0, 100));
            throw new Error("服务器返回了网页，请检查登录态或 API 路径");
          }
          let errData = null;
          try {
            errData = await res.json();
          } catch (err) {
            errData = null;
          }
          throw new Error(
            (errData && (errData.detail || errData.error)) || fallbackMessage || "请求失败"
          );
        }
        if (contentType.includes("text/html")) {
          const text = await res.text();
          console.warn("收到非 JSON 响应，可能是静态资源路径冲突");
          console.warn("Response preview:", text.slice(0, 100));
          throw new Error("服务器返回了网页，请检查登录态或 API 路径");

        return res.json();

      function hashCode(text) {
        let hash = 0;
        for (let i = 0; i < text.length; i += 1) {
          hash = (hash << 5) - hash + text.charCodeAt(i);
          hash |= 0;
        }
        return Math.abs(hash);
      }

      function slugify(text) {
        return String(text || "")
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9\u4e00-\u9fa5]+/g, "-")
          .replace(/^-+|-+$/g, "");
      }

      function colorPair(seed) {
        const hue = seed % 360;
        const hue2 = (hue + 40 + (seed % 60)) % 360;
        return [`hsl(${hue}, 70%, 55%)`, `hsl(${hue2}, 80%, 45%)`];
      }

      function firstLetter(url) {
        try {
          const host = new URL(url).hostname.replace("www.", "");
          return host.charAt(0).toUpperCase();
        } catch (err) {
          return "A";
        }
      }

      function buildIcon(iconEl, url, iconUrl, isPrivate) {
        const seed = hashCode(url);
        const [c1, c2] = colorPair(seed);

        function fallbackToLetter() {
          iconEl.innerHTML = "";
          iconEl.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
          iconEl.textContent = firstLetter(url);
        }

        const img = document.createElement("img");
        img.className =
          "w-full h-full object-cover rounded-2xl transition-transform duration-300 hover:scale-110";
        img.draggable = false;
        const faviconUrl = url
          ? `https://www.google.com/s2/favicons?domain=${encodeURIComponent(url)}&sz=128`
          : "";
        img.src = iconUrl || faviconUrl;
        img.alt = "";
        img.onerror = () => {
          fallbackToLetter();
        };
        iconEl.innerHTML = "";
        iconEl.appendChild(img);
        if (isPrivate) {
          const lock = document.createElement("div");
          lock.className = "lock";
          lock.innerHTML =
            '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2ZM10 7a2 2 0 1 1 4 0v2h-4V7Z"/></svg>';
          iconEl.appendChild(lock);
        }
      }

      function updateContainerState(container) {
        if (!container) return;
        const isDock = container.classList.contains("dock-slot");
        const categoryName = isDock ? "" : container.dataset.category || "";
        container.querySelectorAll(".app").forEach((app) => {
          app.dataset.dock = isDock ? "true" : "false";
          app.dataset.category = categoryName;
        });
      }

        function renderCategoryNav(categories) {
          const nav = document.querySelector("#categoryNav");
          if (!nav) return;
          nav.innerHTML = "";
          if (!nav.dataset.wheelBound) {
            nav.addEventListener(
              "wheel",
              (event) => {
                if (event.deltaY !== 0) {
                  event.preventDefault();
                  nav.scrollLeft += event.deltaY;
                }
              },
              { passive: false }
            );
            nav.dataset.wheelBound = "true";
          }
          categories.forEach((category) => {
            const pill = document.createElement("button");
            pill.type = "button";
            pill.className = "category-pill nav-item";
            pill.textContent = category;
            pill.addEventListener("click", () => {
              nav.querySelectorAll(".category-pill").forEach((btn) => {
                btn.classList.remove("active");
              });
              pill.classList.add("active");
              const target = document.getElementById(`category-${slugify(category)}`);
              if (!target) return;
              const headerHeight = document.querySelector(".site-header")?.offsetHeight || 0;
              const navHeight = nav.offsetHeight || 0;
              const top =
                target.getBoundingClientRect().top + window.scrollY - headerHeight - navHeight - 12;
              window.scrollTo({ top: Math.max(0, top), behavior: "smooth" });
            });
            nav.appendChild(pill);
          });
        }

      function destroySortables() {
        sortables.forEach((instance) => {
          try {
            instance.destroy();

        });
        sortables = [];
      }

      function clearDragImage(event) {
        try {
          const dataTransfer = event?.originalEvent?.dataTransfer;
          if (dataTransfer && typeof dataTransfer.setDragImage === "function") {
            dataTransfer.setDragImage(new Image(), 0, 0);
          }
        } catch (err) {}
      }

      function setSortablesEnabled(enabled) {
        sortables.forEach((instance) => {
          try {
            instance.option("disabled", !enabled);
          } catch (err) {}
        });

      function initSortables() {
        console.log("Sortable init:", typeof Sortable, "loggedIn:", loggedIn, "sortUnlocked:", sortUnlocked);
        if (!window.Sortable || !loggedIn || !sortUnlocked) {
          destroySortables();
          return;
        }
        destroySortables();

          const categorySortable = new Sortable(grid, {
            animation: 300,
            draggable: ".category-card",
            handle: ".category-title-capsule",
            forceFallback: true,
            easing: "cubic-bezier(0.25, 1, 0.5, 1)",
            swapThreshold: 0.65,
            disabled: false,
            onStart: (event) => {
              console.log("图标拖拽已捕获");
              document.body.classList.add("is-dragging");
              clearDragImage(event);
            },
          onEnd: () => {
            console.log("排序数据已保存");
            document.body.classList.remove("is-dragging");
            pendingChanges = true;
            scheduleAutoSave();
          }
        });
        sortables.push(categorySortable);

        document.querySelectorAll(".category-grid").forEach((container) => {
          const rect = container.getBoundingClientRect();
          console.log("Category grid rect:", rect.width, rect.height);
          const sortable = new Sortable(container, {
            animation: 300,
            draggable: ".icon-item",
            handle: ".icon-item",
            group: { name: "shared", pull: true, put: true },
            sort: true,
            forceFallback: true,
            swap: false,
            easing: "cubic-bezier(0.25, 1, 0.5, 1)",
            swapThreshold: 0.65,
            ghostClass: "sortable-ghost",
            dragClass: "sortable-drag",
            disabled: false,
            onStart: (event) => {
              console.log("图标拖拽已捕获");
              document.body.classList.add("is-dragging");
              clearDragImage(event);
              if (event.item) {
                event.item.classList.add("is-dragging");
              }
              if (dockGrid) {
                dockGrid.classList.add("dock-drop");
              }
            },
            onAdd: (event) => {
              const card = event.item;
              if (!card) return;
              const id = card.dataset.id;
              const categoryName = container.dataset.category || "";
              updateLinkDockState(id, false, categoryName, null);
            },
            onEnd: (event) => {
              console.log("排序数据已保存");
              document.body.classList.remove("is-dragging");
              if (event.item) {
                event.item.classList.remove("is-dragging");
              }
              pendingChanges = true;
              updateContainerState(event.from);
              updateContainerState(event.to);
              syncAllOrders();
              if (dockGrid) {
                dockGrid.classList.remove("dock-drop");
              }
            }
          });
          sortables.push(sortable);
        });
        if (dockGrid) {
          dockGrid.querySelectorAll(".dock-slot").forEach((slot) => {
            const rect = slot.getBoundingClientRect();
            console.log("Dock slot rect:", rect.width, rect.height);
            const dockSortable = new Sortable(slot, {
              animation: 300,
              draggable: ".icon-item",
              handle: ".icon-item",
              group: { name: "shared", pull: true, put: true },
              sort: true,
              forceFallback: true,
              swap: true,
              swapThreshold: 0.65,
              easing: "cubic-bezier(0.25, 1, 0.5, 1)",
              ghostClass: "sortable-ghost",
              dragClass: "sortable-drag",
              disabled: false,
              onStart: (event) => {
                console.log("图标拖拽已捕获");
                document.body.classList.add("is-dragging");
                clearDragImage(event);
                dockGrid.classList.add("dock-drop");
                if (event.item) {
                  event.item.classList.add("is-dragging");
                }
              },
              onMove: (event) => {
                if (!event.to || !event.to.classList.contains("dock-slot")) {
                  return true;
                }
                const fromDock = event.from && event.from.classList.contains("dock-slot");
                if (event.from && event.from.classList.contains("dock-slot")) {
                  return true;
                }
                const existing = event.to.querySelector(".app");
                if (existing && !fromDock) {
                  return false;
                }
                if (getDockCountLive() >= dockLimit) {
                  showToast("快捷栏已满（限6个图标），请先移除多余项。");
                  return false;
                }
                return true;
              },
              onAdd: (event) => {
                const card = event.item;
                if (!card) return;
                const fromDock = event.from && event.from.classList.contains("dock-slot");
                const existing = Array.from(event.to.querySelectorAll(".app")).find(
                  (app) => app !== card
                );
                if (existing && !fromDock) {
                  event.from && event.from.appendChild(card);
                  return;
                }
                if (existing && event.from) {
                  event.from.appendChild(existing);
                }
                const id = card.dataset.id;
                const slotIndex = Number(event.to.dataset.slot);
                if (getDockCountLive() > dockLimit) {
                  showToast("快捷栏已满（限6个图标），请先移除多余项。");
                  event.from && event.from.appendChild(card);
                  return;
                }
                updateLinkDockState(id, true, "", slotIndex);
                if (existing) {
                  const fromCategory = event.from.dataset.category || "";
                  const fromIsDock = event.from.classList.contains("dock-slot");
                  const fromSlot = fromIsDock ? Number(event.from.dataset.slot) : null;
                  updateLinkDockState(
                    existing.dataset.id,
                    fromIsDock,
                    fromIsDock ? "" : fromCategory,
                    fromIsDock ? fromSlot : null
                  );
                }
              },
              onRemove: () => {
                updateContainerState(slot);
              },
              onEnd: (event) => {
                console.log("排序数据已保存");
                document.body.classList.remove("is-dragging");
                if (event.item) {
                  event.item.classList.remove("is-dragging");
                }
                pendingChanges = true;
                updateContainerState(event.from);
                updateContainerState(event.to);
                dockGrid.classList.remove("dock-drop");
                syncAllOrders();
              }
            });
            sortables.push(dockSortable);
          });
        }
      }

        })
          .then((res) => {
            if (!res.ok) {
              throw new Error("Delete failed");

      function handleBadgeAction(event) {
        const editBtn = event.target.closest(".edit-badge");
        const deleteBtn = event.target.closest(".delete-badge");
        const card = event.target.closest(".app");
        const id =
          (editBtn && editBtn.dataset.id) ||
          (deleteBtn && deleteBtn.dataset.id) ||
          (card ? card.dataset.id : null);
        if (!id) {
          return;
        }
        if (editBtn || deleteBtn) {
          event.preventDefault();
          event.stopPropagation();
          if (editBtn) {
            const item = allLinks.find((link) => String(link.id) === String(id));
            if (item) {
              openEditModal(item);
            }
            return;
          }
          if (deleteBtn) {
            showDeleteBubble(card, id);
            return;
          }
        }

        if (currentMode !== "preview" && currentMode !== "sort") {
          event.preventDefault();
          event.stopPropagation();
          if (currentMode === "edit") {
            const item = allLinks.find((link) => String(link.id) === String(id));
            if (item) {
              openEditModal(item);
            }
            return;
          }
          if (currentMode === "delete") {
            showDeleteBubble(card, id);
          }
        }
      }

          '<button type="button" class="confirm">确认</button><button type="button" class="cancel">取消</button>';

      function saveAppearanceSettings(payload) {
        if (!loggedIn) {
          return;
        }
        fetch("/api/settings", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json; charset=utf-8"
          },
          body: JSON.stringify(payload)
        })
          .then((res) => {
            if (!res.ok) {
              throw new Error("Failed to save settings");
            }
            return res.json();
          })
          .then(() => {
            if (payload.siteName && siteTitle) {
              siteTitle.textContent = payload.siteName;
              document.title = payload.siteName;
            }
            if (payload.backgroundColor !== undefined) {
              applyBackground(payload.backgroundColor);
            }
            showToast("保存成功");
          })
          .catch(() => {
            showToast("保存失败");
          });
      }

      function updateLinkDockState(id, isDock, categoryName, positionIndex) {
        const target = allLinks.find((item) => String(item.id) === String(id));
        if (!target) return;
        if (isDock && !target.is_dock && getDockCountLive() >= dockLimit) {
          showToast("快捷栏已满（限6个图标），请先移除多余项。");
          applySearch();
          return;
        }
        const payload = {
          title: target.title || "",
          url: target.url || "",
          category: isDock ? "" : categoryName || target.category || "",
          is_private: target.is_private ? 1 : 0,
          is_dock: isDock,
          position_index: isDock && typeof positionIndex === "number" ? positionIndex : null
        };
        fetch(`/api/links/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json; charset=utf-8" },
          body: JSON.stringify(payload)
        })
          .then((res) => {
            if (!res.ok) throw new Error("Failed");
            target.is_dock = isDock;
            target.category = payload.category;
            target.position_index = payload.position_index;
            applySearch();
          })
          .catch(() => {});
      }

      function scheduleAutoSave() {
        if (!loggedIn) return;

          clearTimeout(saveTimer);

        saveTimer = setTimeout(() => {
          saveEditingChanges()
            .then(() => {
              pendingChanges = false;
              document.querySelectorAll(".category-card").forEach((card) => {
                card.dataset.original = card.dataset.category || "";
              });
              showToast("保存成功");
            })
            .catch(() => {
              showToast("保存失败");
            });
          }, 600);
        }

        if (!Array.isArray(orderIds)) return;
        pendingChanges = true;

        document.querySelectorAll(".dock-slot").forEach((slot) => {
          updateContainerState(slot);

      function setSortLockState(unlocked) {
        if (!loggedIn) {
          sortUnlocked = false;
          document.body.classList.remove("sort-unlocked");
          destroySortables();
          return;

      function collectEditingPayload() {
        const categoryCards = Array.from(document.querySelectorAll(".category-card"));
        const categories = categoryCards.map((card, index) => ({
          name: card.dataset.category || "",
          sort_index: index
        }));
        const renames = categoryCards
          .map((card) => ({
            from: card.dataset.original || "",
            to: card.dataset.category || ""
          }))
          .filter((item) => item.from && item.to && item.from !== item.to);

        const links = [];
        const linkTitles = [];
        categoryCards.forEach((card) => {
          const categoryName = card.dataset.category || "";
          const items = card.querySelectorAll(".category-grid .app");
          items.forEach((app, index) => {
            links.push({
              id: app.dataset.id,
              sort_index: index,
              category: categoryName,
              is_dock: false
            });
            const originalTitle = app.dataset.originalTitle || "";
            const currentTitle = app.dataset.title || "";
            if (currentTitle && currentTitle !== originalTitle) {
              linkTitles.push({ id: app.dataset.id, title: currentTitle });
              app.dataset.originalTitle = currentTitle;
            }
          });
        });
        if (dockGrid) {
          dockGrid.querySelectorAll(".dock-slot").forEach((slot) => {
            const app = slot.querySelector(".app");
            if (!app) return;
            const positionIndex = Number(slot.dataset.slot);
            links.push({
              id: app.dataset.id,
              sort_index: Number(positionIndex) || 0,
              position_index: Number.isNaN(positionIndex) ? null : positionIndex,
              category: "",
              is_dock: true
            });
            const originalTitle = app.dataset.originalTitle || "";
            const currentTitle = app.dataset.title || "";
            if (currentTitle && currentTitle !== originalTitle) {
              linkTitles.push({ id: app.dataset.id, title: currentTitle });
              app.dataset.originalTitle = currentTitle;
            }
          });
        }
        return { categories, links, renames, linkTitles };
      }

      function initDockFisheye() {
        const dock = document.querySelector("#dock-container");
        if (!dock) return;
        let rafId = null;
        const maxDistance = 140;
        const minScale = 1;
        const maxScale = 1.5;

        function resetScales() {
          dock.querySelectorAll(".dock-item").forEach((item) => {
            item.style.transform = "translateY(0) scale(1)";
          });
        }

        function handleMove(event) {
          if (editing || deleting || sortUnlocked) {
            resetScales();
            return;
          }
          const rect = dock.getBoundingClientRect();
          const x = event.clientX - rect.left;
          if (rafId) cancelAnimationFrame(rafId);
          rafId = requestAnimationFrame(() => {
            dock.querySelectorAll(".dock-item").forEach((item) => {
              const itemRect = item.getBoundingClientRect();
              const center = itemRect.left - rect.left + itemRect.width / 2;
              const dist = Math.abs(x - center);
              const t = Math.max(0, 1 - dist / maxDistance);
              const scale = minScale + (maxScale - minScale) * t * t;
              const lift = -10 * t;
              item.style.transform = `translateY(${lift}px) scale(${scale})`;
            });
          });
        }

        dock.addEventListener("mousemove", handleMove);
        dock.addEventListener("mouseleave", () => {
          if (rafId) cancelAnimationFrame(rafId);
          resetScales();
        });
      }

      function initCategoryFisheye() {
        const categoryGrids = document.querySelectorAll(".category-grid");
        if (!categoryGrids.length) return;
        categoryGrids.forEach((gridEl) => {
          let rafId = null;
          const maxDistance = 200;
          const minScale = 1;
          const maxScale = 1.3;
          const neighborScale = 1.15;

          function resetScales() {
            gridEl.querySelectorAll(".app").forEach((item) => {
              item.style.transform = "translateY(0) scale(1)";
              item.style.zIndex = "";
            });
          }

          function handleMove(event) {
            if (sortUnlocked) {
              resetScales();
              return;
            }
            const rect = gridEl.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            if (rafId) cancelAnimationFrame(rafId);
            rafId = requestAnimationFrame(() => {
              const items = Array.from(gridEl.querySelectorAll(".app"));
              items.forEach((item) => {
                const itemRect = item.getBoundingClientRect();
                const centerX = itemRect.left - rect.left + itemRect.width / 2;
                const centerY = itemRect.top - rect.top + itemRect.height / 2;
                const dx = x - centerX;
                const dy = y - centerY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const t = Math.max(0, 1 - dist / maxDistance);
                const eased = t * t;
                const scale = minScale + (maxScale - minScale) * eased;
                const neighbor = minScale + (neighborScale - minScale) * eased;
                const finalScale = Math.max(scale, neighbor);
                const lift = -6 * eased;
                item.style.transform = `translateY(${lift}px) scale(${finalScale})`;
                item.style.zIndex = t > 0 ? "100" : "";
              });
            });
          }

          gridEl.addEventListener("mousemove", handleMove);
          gridEl.addEventListener("mouseleave", () => {
            if (rafId) cancelAnimationFrame(rafId);
            resetScales();
          });
        });
      }

        let positionIndex = null;
        if (dockInput && dockInput.checked) {
          if (editingDockPosition !== null && !Number.isNaN(editingDockPosition)) {
            positionIndex = editingDockPosition;
          } else {
            positionIndex = getFirstEmptyDockSlot();
          }
          if (positionIndex === null) {
            showToast("快捷栏已满（限6个图标），请先移除多余项。");
            return;
          }
        }
        const payload = {
          title: titleInput.value.trim(),
          url: urlInput.value.trim(),
          category: dockInput && dockInput.checked ? "" : categoryInput.value.trim(),
          is_private: privateInput.checked ? 1 : 0,
          is_dock: dockInput && dockInput.checked,
          position_index: positionIndex
        };
        const targetUrl = editingLinkId ? `/api/links/${editingLinkId}` : "/api/links";
        const method = editingLinkId ? "PUT" : "POST";
          fetch(targetUrl, {
            method,
            headers: { "Content-Type": "application/json; charset=utf-8" },
            credentials: "same-origin",
            body: JSON.stringify(payload)
          })
            .then((res) => {
              if (!res.ok) throw new Error("Failed to save");
              closeEditModalToPreview();
              window.location.reload(true);
            })
            .catch(() => {});
        });

      if (exportBtn) {
        exportBtn.addEventListener("click", () => {
          fetch("/api/backup/export")
            .then((res) => res.blob())
            .then((blob) => {
              const url = URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.href = url;
              a.download = "mynav-backup.json";
              document.body.appendChild(a);
              a.click();
              a.remove();
              URL.revokeObjectURL(url);
            })
            .catch(() => {});
        });
      }

      if (importBtn) {
        importBtn.addEventListener("click", () => {
          if (!importFile || !importFile.files || !importFile.files[0]) return;
          const formData = new FormData();
          formData.append("backup", importFile.files[0]);
          fetch("/api/backup/import", {
            method: "POST",
            body: formData
          })
            .then((res) => {
              if (!res.ok) {
                throw new Error("Import failed");
              }
              return res.json();
            })
            .then(() => {
              importFile.value = "";
              fetchLinks();
            })
            .catch(() => {});
        });
      }

      fetch("/api/me")
        .then((res) => res.json())
        .then((data) => {
          const logged = Boolean(data && data.loggedIn);
          setLoginState(logged);
          if (logged) {
            applyUserProfile(data.userName || "Admin", data.userAvatar || "");
          } else {
            applyUserProfile("Admin", "");
          }
        })
        .catch(() => {
          setLoginState(false);
        });

      fetch("/api/settings")
        .then((res) => res.json())
        .then((data) => {
          if (data && data.siteName) {
            siteTitle.textContent = data.siteName;
            siteNameInput.value = data.siteName;
            document.title = data.siteName;
          }
          if (data && data.backgroundColor) {
            if (bgColorInput) {
              bgColorInput.value = data.backgroundColor;
            }
            applyBackground(data.backgroundColor);
          }
        })
        .catch(() => {});

      fetchLinks();
      applyFontSettings();
      updateThemeButton();
      initMobilePosition();
      initDockFisheye();
      initCategoryFisheye();
      });
    </script>
  </body>
</html>
