<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>&#x6CE8;&#x518C;</title>
    <style>
      :root {
        --bg-a: #f7f2ee;
        --bg-b: #e7edf7;
        --text: #17181a;
        --muted: #6a6f7a;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(800px 300px at 15% 0%, rgba(255, 255, 255, 0.8), transparent 70%),
          radial-gradient(900px 400px at 80% 10%, rgba(255, 255, 255, 0.7), transparent 60%),
          linear-gradient(160deg, var(--bg-a), var(--bg-b));
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .toast {
        position: fixed;
        top: 18px;
        left: 50%;
        transform: translateX(-50%) translateY(-8px);
        background: rgba(15, 23, 42, 0.85);
        color: #fff;
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 13px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
        z-index: 9999;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .card {
        width: min(380px, 100%);
        background: rgba(255, 255, 255, 0.9);
        border-radius: 24px;
        padding: 22px;
        box-shadow: 0 18px 40px rgba(16, 24, 40, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.6);
      }
      h1 {
        margin: 0 0 6px;
        font-size: 22px;
      }
      p {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 13px;
      }
      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
      }
      label {
        font-size: 12px;
        color: var(--muted);
      }
      input {
        border: 1px solid rgba(0, 0, 0, 0.1);
        border-radius: 14px;
        padding: 10px 12px;
        font-size: 14px;
        outline: none;
        background: rgba(255, 255, 255, 0.85);
      }
      button {
        width: 100%;
        border: none;
        border-radius: 14px;
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
        background: #0a84ff;
        color: #ffffff;
        box-shadow: 0 8px 20px rgba(16, 24, 40, 0.15);
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .btn-row {
        display: flex;
        gap: 10px;
        margin-top: 6px;
      }
      .btn-row button {
        flex: 1;
      }
      button.secondary {
        background: #e2e8f0;
        color: #1f2937;
        box-shadow: none;
      }
      .error {
        margin-top: 10px;
        color: #d64545;
        font-size: 12px;
        display: none;
      }
      .honeypot {
        position: absolute;
        left: -10000px;
        top: auto;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }
      .turnstile-field {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>&#x6CE8;&#x518C;</h1>
      <p>&#x521B;&#x5EFA;&#x65B0;&#x8D26;&#x53F7;&#xFF08;&#x6CE8;&#x518C;&#x9700;&#x8981;&#x9080;&#x8BF7;&#x7801;&#xFF09;</p>
      <form id="registerForm">
        <div class="field">
          <label for="usernameInput">&#x7528;&#x6237;&#x540D;</label>
          <input id="usernameInput" type="text" required />
        </div>
        <div class="field">
          <label for="emailInput">&#x90AE;&#x7BB1;</label>
          <input id="emailInput" type="email" required />
        </div>
        <div class="field">
          <label for="passwordInput">&#x5BC6;&#x7801;</label>
          <input id="passwordInput" type="password" required />
        </div>
        <div class="field">
          <label for="confirmInput">&#x786E;&#x8BA4;&#x5BC6;&#x7801;</label>
          <input id="confirmInput" type="password" required />
        </div>
        <div class="field">
          <label for="inviteInput">&#x6CE8;&#x518C;&#x9080;&#x8BF7;&#x7801;</label>
          <input id="inviteInput" type="text" autocomplete="off" required />
        </div>
        <div class="field turnstile-field" id="turnstileField">
          <div id="turnstileWidget"></div>
        </div>
        <div class="honeypot" aria-hidden="true">
          <label for="companyInput">Company</label>
          <input id="companyInput" type="text" tabindex="-1" autocomplete="off" />
        </div>
        <div class="btn-row">
          <button type="submit">&#x6CE8;&#x518C;</button>
          <button type="button" id="loginLinkBtn" class="secondary">&#x767B;&#x5F55;</button>
        </div>
        <div class="error" id="errorMsg"></div>
      </form>
    </div>
    <div class="toast" id="toast">保存成功</div>

    <script>
      const form = document.querySelector("#registerForm");
      const usernameInput = document.querySelector("#usernameInput");
      const emailInput = document.querySelector("#emailInput");
      const passwordInput = document.querySelector("#passwordInput");
      const confirmInput = document.querySelector("#confirmInput");
      const inviteInput = document.querySelector("#inviteInput");
      const companyInput = document.querySelector("#companyInput");
      const errorMsg = document.querySelector("#errorMsg");
      const turnstileField = document.querySelector("#turnstileField");
      const turnstileWidget = document.querySelector("#turnstileWidget");
      const toast = document.querySelector("#toast");
      const submitBtn = form.querySelector('button[type="submit"]');
      const loginLinkBtn = document.querySelector("#loginLinkBtn");
      const params = new URLSearchParams(window.location.search);
      const prefillCode = params.get("code");
      if (prefillCode && inviteInput) {
        inviteInput.value = prefillCode;
      }
      if (loginLinkBtn) {
        loginLinkBtn.addEventListener("click", () => {
          window.location.href = "/login.html";
        });
      }
      let turnstileToken = "";
      let turnstileRequired = false;

      function loadTurnstile(siteKey) {
        if (!siteKey || !turnstileWidget) return;
        const script = document.createElement("script");
        script.src = "https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit";
        script.async = true;
        script.defer = true;
        script.onload = () => {
          if (!window.turnstile) return;
          window.turnstile.render(turnstileWidget, {
            sitekey: siteKey,
            callback: (token) => {
              turnstileToken = token;
            },
            "expired-callback": () => {
              turnstileToken = "";
            }
          });
        };
        document.head.appendChild(script);
      }

      fetch("/api/public-config")
        .then((res) => res.json())
        .then((config) => {
          turnstileRequired = Boolean(config && config.turnstileEnabled && config.turnstileSiteKey);
          if (turnstileRequired) {
            if (turnstileField) {
              turnstileField.style.display = "block";
            }
            loadTurnstile(config.turnstileSiteKey);
          }
        })
        .catch(() => {});

      function showToast(message) {
        if (!toast) return;
        toast.textContent = message;
        toast.classList.add("show");
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => {
          toast.classList.remove("show");
        }, 1500);
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        if (form.dataset.cooldownUntil) {
          const next = Number(form.dataset.cooldownUntil);
          if (Date.now() < next) {
            showToast("请稍后再试");
            return;
          }
        }
        const username = usernameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const confirm = confirmInput.value;
        const inviteCode = inviteInput ? inviteInput.value.trim() : "";
        const company = companyInput ? companyInput.value.trim() : "";

        if (!username || !password || !email || !inviteCode) {
          showToast("&#x8BF7;&#x5B8C;&#x6574;&#x586B;&#x5199;&#x4FE1;&#x606F;");
          return;
        }
        if (password !== confirm) {
          errorMsg.textContent = "&#x4E24;&#x6B21;&#x5BC6;&#x7801;&#x4E0D;&#x4E00;&#x81F4;";
          errorMsg.style.display = "block";
          showToast("&#x5BC6;&#x7801;&#x4E0D;&#x4E00;&#x81F4;");
          return;
        }
        if (turnstileRequired && !turnstileToken) {
          errorMsg.textContent = "&#x8BF7;&#x5148;&#x5B8C;&#x6210;&#x9A8C;&#x8BC1;";
          errorMsg.style.display = "block";
          showToast("&#x8BF7;&#x5148;&#x5B8C;&#x6210;&#x9A8C;&#x8BC1;");
          return;
        }

        const cooldownMs = 8000;
        form.dataset.cooldownUntil = String(Date.now() + cooldownMs);
        if (submitBtn) {
          submitBtn.disabled = true;
          submitBtn.textContent = "请稍候...";
          setTimeout(() => {
            submitBtn.disabled = false;
            submitBtn.textContent = "注册";
          }, cooldownMs);
        }

        fetch("/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username,
            email,
            password,
            inviteCode,
            company,
            turnstileToken
          })
        })
          .then(async (res) => {
            if (res.ok) {
              showToast("&#x6CE8;&#x518C;&#x6210;&#x529F;");
              window.location.href = "/login.html";
              return;
            }
            const data = await res.json().catch(() => ({}));
            const message =
              data && data.error
                ? data.error
                : "&#x6CE8;&#x518C;&#x5931;&#x8D25;";
            throw new Error(message);
          })
          .catch((err) => {
            let message = err.message || "&#x6CE8;&#x518C;&#x5931;&#x8D25;";
            if (message === "registration_closed") {
              message = "&#x6CE8;&#x518C;&#x5DF2;&#x5173;&#x95ED;&#xFF0C;&#x8BF7;&#x4F7F;&#x7528;&#x9080;&#x8BF7;&#x7801;";
            }
            if (message === "turnstile_failed") {
              message = "&#x9A8C;&#x8BC1;&#x5931;&#x8D25;&#xFF0C;&#x8BF7;&#x91CD;&#x8BD5;";
            }
            if (message === "invalid_invite") {
              message = "&#x9080;&#x8BF7;&#x7801;&#x65E0;&#x6548;&#x6216;&#x5DF2;&#x8FC7;&#x671F;";
            }
            if (message === "invite_required") {
              message = "&#x8BF7;&#x586B;&#x5199;&#x9080;&#x8BF7;&#x7801;";
            }
            errorMsg.textContent = message;
            errorMsg.style.display = "block";
            showToast(message);
          });
      });
    </script>
  </body>
</html>
